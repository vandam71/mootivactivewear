<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho – Mootiv Active</title>
    <meta name="description" content="O teu carrinho de compras Mootiv Active.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- shared header -->
    <div id="site-header"></div>

    <div class="container">
        <h1 style="font-size:1.3em; font-weight:700; margin-bottom:24px;" data-i18n="cart.title">O teu Carrinho</h1>
        <div id="cartItems"></div>
        <div id="cartEmpty" class="empty-state" style="display:none;">
            <span class="empty-state-icon">🛒</span>
            <p class="empty-state-title" data-i18n="cart.empty_title">O teu carrinho está vazio</p>
            <p class="empty-state-sub" data-i18n-html="cart.empty_sub">Ainda não adicionaste nada.<br>Descobre a nossa
                coleção e encontra o teu próximo favorito.</p>
            <a href="shop.html" class="btn" style="margin-top:16px;" data-i18n="cart.explore_btn">Explorar coleção →</a>
        </div>
        <div id="cartSummary" class="cart-summary" style="display:none;">
            <div class="cart-note" data-i18n="cart.shipping_note">Envio: €4.99 &nbsp;·&nbsp; IVA 23% incluído</div>
            <div class="cart-total-row">
                <span data-i18n="cart.total">Total</span>
                <span id="cartTotal">€0.00</span>
            </div>
            <a href="checkout.html" class="btn" id="checkoutBtn" data-i18n="cart.checkout_btn">Finalizar Compra →</a>
        </div>
        <a href="shop.html" class="btn btn-outline" id="continueShopping" style="margin-top:12px; display:none;"
            data-i18n="cart.continue_btn">← Continuar a comprar</a>
    </div>

    <!-- shared footer -->
    <div id="site-footer"></div>

    <script src="includes/translations.js"></script>
    <script src="includes/include.js"></script>
    <script>
        var cachedProducts = null;

        function saveAndRender(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart(cart, cachedProducts);
            var badge = document.getElementById('cart-count');
            if (badge) {
                var total = cart.reduce(function (s, i) { return s + (i.qty || 1); }, 0);
                badge.textContent = total > 0 ? total : '';
                badge.style.display = total > 0 ? 'inline-flex' : 'none';
            }
        }

        function renderCart(cart, products) {
            cart = cart || JSON.parse(localStorage.getItem('cart') || '[]');
            var container = document.getElementById('cartItems');
            var emptyMsg = document.getElementById('cartEmpty');
            var summary = document.getElementById('cartSummary');
            container.innerHTML = '';

            if (!cart.length) {
                emptyMsg.style.display = 'block';
                summary.style.display = 'none';
                document.getElementById('continueShopping').style.display = 'none';
                return;
            }
            emptyMsg.style.display = 'none';
            summary.style.display = 'block';
            document.getElementById('continueShopping').style.display = 'inline-block';

            var grandTotal = 0;
            cart.forEach(function (item, idx) {
                var lineTotal = item.price * item.qty;
                grandTotal += lineTotal;

                var imgSrc = '';
                if (products) {
                    var prod = products.find(function (p) { return p.id === item.id; });
                    if (prod && prod.images) {
                        imgSrc = (item.color && prod.images[item.color])
                            ? prod.images[item.color]
                            : prod.images[Object.keys(prod.images)[0]];
                    }
                }

                var row = document.createElement('div');
                row.className = 'cart-item';
                row.innerHTML =
                    '<img class="cart-item-img" src="' + imgSrc + '" alt="' + item.name + '">' +
                    '<div class="cart-item-info">' +
                    '<div class="cart-item-name">' + item.name + '</div>' +
                    (item.size ? '<div class="cart-item-meta">' + t('cart.size') + ': ' + item.size + '</div>' : '') +
                    (item.color ? '<div class="cart-item-meta"><span class="color-dot" style="background:' + item.color + '; width:12px; height:12px; display:inline-block; border-radius:50%; border:1px solid #ccc; margin-right:4px; vertical-align:middle;"></span>' + item.color + '</div>' : '') +
                    '<div class="cart-item-meta">€' + item.price.toFixed(2) + ' × ' +
                    '<button class="qty-btn" aria-label="' + t('cart.remove_title') + '" data-idx="' + idx + '" data-delta="-1">−</button>' +
                    '<span class="qty-val">' + item.qty + '</span>' +
                    '<button class="qty-btn" aria-label="' + t('cart.remove_title') + '" data-idx="' + idx + '" data-delta="1">+</button>' +
                    '</div>' +
                    '</div>' +
                    '<div class="cart-item-total">€' + lineTotal.toFixed(2) + '</div>' +
                    '<button class="cart-remove" data-idx="' + idx + '" title="Remover">✕</button>';
                container.appendChild(row);
            });

            document.getElementById('cartTotal').textContent = '€' + grandTotal.toFixed(2);

            container.querySelectorAll('.qty-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var c = JSON.parse(localStorage.getItem('cart') || '[]');
                    var i = parseInt(btn.dataset.idx);
                    c[i].qty += parseInt(btn.dataset.delta);
                    if (c[i].qty <= 0) c.splice(i, 1);
                    saveAndRender(c);
                });
            });
            container.querySelectorAll('.cart-remove').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var c = JSON.parse(localStorage.getItem('cart') || '[]');
                    c.splice(parseInt(btn.dataset.idx), 1);
                    saveAndRender(c);
                });
            });
        }

        fetch('products/products.json')
            .then(function (r) { return r.json(); })
            .then(function (data) { cachedProducts = data.products; renderCart(null, cachedProducts); })
            .catch(function () { renderCart(); });
    </script>
</body>

</html>
