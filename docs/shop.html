<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Mootiv Active</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- shared header -->
    <div id="site-header"></div>

    <div class="container">
        <h1>Loja Mootiv Active</h1>
        <div class="products" id="productsGrid">
            <!-- products will be loaded here from products.json -->
        </div>
        <a href="cart.html" class="btn">Ir para o Carrinho</a>
        <!-- shared footer -->
        <div id="site-footer"></div>
    </div>
    <script src="includes/include.js"></script>
    <script>
        // Simple cart using localStorage
        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let item = cart.find(i => i.id === id);
            if (item) {
                item.qty += 1;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Adicionado ao carrinho!');
        }

        // Render products loaded from products.json
        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product';

                const content = document.createElement('div');
                content.className = 'content';

                const imgLink = document.createElement('a');
                imgLink.href = 'product.html?id=' + encodeURIComponent(p.id);

                const img = document.createElement('img');
                img.src = p.image;
                img.alt = p.name;
                imgLink.appendChild(img);

                const h2 = document.createElement('h2');
                h2.textContent = p.name;

                const price = document.createElement('p');
                price.className = 'price';
                price.innerHTML = '€' + p.price.toFixed(2);

                content.appendChild(imgLink);
                content.appendChild(h2);
                content.appendChild(price);

                // color dots up to 4
                if (Array.isArray(p.colors) && p.colors.length) {
                    const dots = document.createElement('div');
                    dots.className = 'color-dots';
                    p.colors.slice(0, 4).forEach(c => {
                        const linkDot = document.createElement('a');
                        linkDot.href = 'product.html?id=' + encodeURIComponent(p.id) + '&color=' + encodeURIComponent(c);
                        const dot = document.createElement('span');
                        dot.className = 'color-dot';
                        dot.style.background = c;
                        linkDot.appendChild(dot);
                        dots.appendChild(linkDot);
                    });
                    content.appendChild(dots);
                }

                card.appendChild(content);

                grid.appendChild(card);
            });
        }

        // Load products from standalone products.json (requires http/https)
        (function loadProducts() {
            fetch('products.json')
                .then(res => {
                    if (!res.ok) throw new Error('Failed to load products.json');
                    return res.json();
                })
                .then(data => {
                    if (!data || !Array.isArray(data.products)) throw new Error('Invalid products.json format');
                    var products = data.products.slice();
                    var params = new URLSearchParams(window.location.search);
                    var filter = params.get('filter');
                    var gender = params.get('gender');
                    var category = params.get('category');
                    if (filter === 'new') {
                        products = products.filter(p => p.new);
                    }
                    if (gender) {
                        products = products.filter(p => p.gender === gender);
                    }
                    if (category) {
                        // placeholder for future category filtering
                        products = products.filter(p => p.category === category);
                    }
                    renderProducts(products);
                })
                .catch(err => {
                    console.error('Error loading products:', err);
                    const grid = document.getElementById('productsGrid');
                    grid.innerHTML = '<p>Erro ao carregar produtos.</p>';
                });
        })();
    </script>
</body>

</html>
