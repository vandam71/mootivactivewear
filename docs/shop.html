<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coleção – Mootiv Active</title>
    <meta name="description"
        content="Explora a coleção completa de roupa desportiva da Mootiv Active. Filtra por novidades, género ou categoria.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- shared header -->
    <div id="site-header"></div>

    <div class="container">
        <div class="filter-bar" id="filterBar">
            <a href="shop.html" class="filter-pill" data-filter="all" data-i18n="filter.all">Todos</a>
            <a href="shop.html?filter=new" class="filter-pill" data-filter="new" data-i18n="filter.new">New</a>
            <a href="shop.html?gender=women" class="filter-pill" data-gender="women" data-i18n="filter.women">Women</a>
            <a href="shop.html?gender=men" class="filter-pill" data-gender="men" data-i18n="filter.men">Men</a>
            <a href="shop.html?category=accessories" class="filter-pill" data-category="accessories" data-i18n="filter.accessories">Accessories</a>
        </div>
        <div class="products" id="productsGrid">
            <!-- products will be loaded here from products.json -->
        </div>
    </div>

    <!-- shared footer -->
    <div id="site-footer"></div>

    <script src="includes/translations.js"></script>
    <script src="includes/include.js"></script>
    <script>
        // Simple cart using localStorage
        function addToCart(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let item = cart.find(i => i.id === id);
            if (item) {
                item.qty += 1;
            } else {
                cart.push({ id, name, price, qty: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            var badge = document.getElementById('cart-count');
            if (badge) {
                var total = cart.reduce(function (s, i) { return s + (i.qty || 1); }, 0);
                badge.textContent = total > 0 ? total : '';
                badge.style.display = total > 0 ? 'inline-flex' : 'none';
            }
        }

        // Render products loaded from products.json
        function renderProducts(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            if (!products.length) {
                grid.innerHTML = '<div class="empty-state"><span class="empty-state-icon">🏃</span><p class="empty-state-title">' + t('shop.empty_title') + '</p><p class="empty-state-sub">' + t('shop.empty_sub') + '</p><a href="shop.html" class="btn" style="margin-top:16px;">' + t('shop.empty_cta') + '</a></div>';
                return;
            }
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product';

                if (p.new) {
                    const badge = document.createElement('span');
                    badge.className = 'badge-new';
                    badge.textContent = t('filter.new');
                    card.appendChild(badge);
                }

                const content = document.createElement('div');
                content.className = 'content';

                const imgLink = document.createElement('a');
                imgLink.href = 'product.html?id=' + encodeURIComponent(p.id);

                const img = document.createElement('img');
                img.src = (p.images && Object.keys(p.images).length) ? p.images[Object.keys(p.images)[0]] : '';
                img.alt = p.name;
                img.loading = 'lazy';
                imgLink.appendChild(img);

                const h2 = document.createElement('h2');
                h2.textContent = p.name;

                const price = document.createElement('p');
                price.className = 'price';
                price.innerHTML = '€' + p.price.toFixed(2);

                content.appendChild(imgLink);
                content.appendChild(h2);
                content.appendChild(price);

                // color dots up to 4
                const imgColors = p.images ? Object.keys(p.images) : [];
                if (imgColors.length) {
                    const dots = document.createElement('div');
                    dots.className = 'color-dots';
                    imgColors.slice(0, 4).forEach(c => {
                        const linkDot = document.createElement('a');
                        linkDot.href = 'product.html?id=' + encodeURIComponent(p.id) + '&color=' + encodeURIComponent(c);
                        linkDot.setAttribute('aria-label', 'Ver cor ' + c);
                        const dot = document.createElement('span');
                        dot.className = 'color-dot';
                        dot.style.background = c;
                        linkDot.appendChild(dot);
                        dots.appendChild(linkDot);
                    });
                    content.appendChild(dots);
                }

                card.appendChild(content);

                grid.appendChild(card);
            });
        }

        // Load products from standalone products.json (requires http/https)
        (function loadProducts() {
            fetch('products/products.json')
                .then(res => {
                    if (!res.ok) throw new Error('Failed to load products.json');
                    return res.json();
                })
                .then(data => {
                    if (!data || !Array.isArray(data.products)) throw new Error('Invalid products.json format');
                    var products = data.products.slice();
                    var params = new URLSearchParams(window.location.search);
                    var filter = params.get('filter');
                    var gender = params.get('gender');
                    var category = params.get('category');
                    if (filter === 'new') {
                        products = products.filter(p => p.new);
                    }
                    if (gender) {
                        products = products.filter(p => p.gender === gender);
                    }
                    if (category) {
                        // placeholder for future category filtering
                        products = products.filter(p => p.category === category);
                    }
                    renderProducts(products);
                })
                .catch(err => {
                    console.error('Error loading products:', err);
                    const grid = document.getElementById('productsGrid');
                    grid.innerHTML = '<p>' + t('shop.load_error') + '</p>';
                });
        })();

        // Mark active filter pill immediately (no fetch wait needed)
        (function markActivePill() {
            var params = new URLSearchParams(window.location.search);
            var filter = params.get('filter');
            var gender = params.get('gender');
            var category = params.get('category');
            document.querySelectorAll('#filterBar .filter-pill').forEach(function (pill) {
                pill.classList.remove('active');
                if (!filter && !gender && !category && pill.dataset.filter === 'all') {
                    pill.classList.add('active');
                } else if (filter && pill.dataset.filter === filter) {
                    pill.classList.add('active');
                } else if (gender && pill.dataset.gender === gender) {
                    pill.classList.add('active');
                } else if (category && pill.dataset.category === category) {
                    pill.classList.add('active');
                }
            });
        })();
    </script>
</body>

</html>
