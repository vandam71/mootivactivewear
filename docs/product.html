<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto – Mootiv Active</title>
    <meta name="description" content="" id="meta-desc">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- shared header -->
    <div id="site-header"></div>

    <div class="container">
        <nav id="breadcrumb" class="breadcrumb"></nav>
        <div class="product-layout">
            <div class="product-image">
                <div class="img-color-wrapper">
                    <img id="prod-image" src="" alt="" loading="lazy" />
                </div>
            </div>
            <div class="product-info">
                <h1 id="prod-name">Produto</h1>
                <p id="prod-price" class="price"></p>
                <div id="prod-colors"></div>
                <div id="prod-sizes"></div>
                <p id="prod-desc">Carregando...</p>
                <button id="addCart" class="btn">Adicionar ao Carrinho</button>
            </div>
        </div>
        <div id="prod-accordion" class="prod-accordion"></div>
    </div>

    <!-- shared footer -->
    <div id="site-footer"></div>

    <script src="includes/translations.js"></script>
    <script src="includes/include.js"></script>

    <script>
        function getQueryParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }

        function addToCart(id, name, price, color) {
            const selectedBtn = document.querySelector('#prod-sizes .size-btn.selected');
            if (!selectedBtn) {
                document.getElementById('prod-sizes').classList.add('size-required');
                return;
            }
            const size = selectedBtn.dataset.size;
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let item = cart.find(i => i.id === id && i.size === size && i.color === color);
            if (item) item.qty += 1; else cart.push({ id, name, price, size, color, qty: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            var badge = document.getElementById('cart-count');
            if (badge) {
                var total = cart.reduce(function (s, i) { return s + (i.qty || 1); }, 0);
                badge.textContent = total > 0 ? total : '';
                badge.style.display = total > 0 ? 'inline-flex' : 'none';
            }
            // button feedback
            var btn = document.getElementById('addCart');
            btn.textContent = t('product.added');
            btn.classList.add('btn-success');
            btn.disabled = true;
            setTimeout(function () {
                btn.textContent = t('product.add_cart');
                btn.classList.remove('btn-success');
                btn.disabled = false;
            }, 2000);
        }

        (function renderProduct() {
            const id = getQueryParam('id');
            fetch('products/products.json')
                .then(res => {
                    if (!res.ok) throw new Error('Failed to load products.json');
                    return res.json();
                })
                .then(data => {
                    if (!data || !Array.isArray(data.products)) throw new Error('Invalid products.json');
                    const product = data.products.find(p => p.id === id) || data.products[0];
                    const selectedColor = getQueryParam('color');
                    document.getElementById('prod-name').textContent = product.name;
                    document.title = product.name + ' – Mootiv Active';
                    const metaDesc = document.getElementById('meta-desc');
                    if (metaDesc) metaDesc.setAttribute('content', product.description);
                    // breadcrumb
                    const crumbNav = document.getElementById('breadcrumb');
                    const genderLabel = product.gender === 'women' ? t('nav.women') : product.gender === 'men' ? t('nav.men') : null;
                    const genderHref = product.gender ? 'shop.html?gender=' + product.gender : null;
                    const crumbs = [
                        { label: t('nav.shop'), href: 'shop.html' },
                        genderLabel ? { label: genderLabel, href: genderHref } : null,
                        { label: product.name, href: null }
                    ].filter(Boolean);
                    crumbs.forEach((c, i) => {
                        if (i > 0) { const sep = document.createElement('span'); sep.className = 'crumb-sep'; sep.textContent = '›'; crumbNav.appendChild(sep); }
                        if (c.href) { const a = document.createElement('a'); a.href = c.href; a.textContent = c.label; crumbNav.appendChild(a); }
                        else { const span = document.createElement('span'); span.className = 'crumb-current'; span.textContent = c.label; crumbNav.appendChild(span); }
                    });
                    const img = document.getElementById('prod-image');
                    // resolve active color: use URL param, or fall back to first color
                    const firstColor = product.images ? Object.keys(product.images)[0] : null;
                    const activeColor = (selectedColor && product.images && product.images[selectedColor])
                        ? selectedColor
                        : firstColor;

                    // normalise: always work with an array of image paths per color
                    function getImgArray(images, color) {
                        const val = images && color ? images[color] : null;
                        if (!val) return [];
                        return Array.isArray(val) ? val : [val];
                    }

                    const activeImages = getImgArray(product.images, activeColor);
                    let imgIdx = 0;
                    img.src = activeImages[0] || '';
                    img.alt = product.name;

                    // Gallery prev / next (only rendered when a color has > 1 image)
                    const wrapper = img.closest('.img-color-wrapper');
                    const prevBtn = document.createElement('button');
                    const nextBtn = document.createElement('button');
                    prevBtn.className = 'gallery-nav prev';
                    nextBtn.className = 'gallery-nav next';
                    prevBtn.setAttribute('aria-label', 'Imagem anterior');
                    nextBtn.setAttribute('aria-label', 'Próxima imagem');
                    prevBtn.innerHTML = '&#8249;';
                    nextBtn.innerHTML = '&#8250;';

                    function updateGallery() {
                        img.src = activeImages[imgIdx];
                        prevBtn.style.display = activeImages.length > 1 ? 'flex' : 'none';
                        nextBtn.style.display = activeImages.length > 1 ? 'flex' : 'none';
                        prevBtn.disabled = imgIdx === 0;
                        nextBtn.disabled = imgIdx === activeImages.length - 1;
                    }

                    prevBtn.addEventListener('click', function () { if (imgIdx > 0) { imgIdx--; updateGallery(); } });
                    nextBtn.addEventListener('click', function () { if (imgIdx < activeImages.length - 1) { imgIdx++; updateGallery(); } });
                    wrapper.appendChild(prevBtn);
                    wrapper.appendChild(nextBtn);
                    updateGallery();
                    document.getElementById('prod-desc').textContent = (window.getLang && window.getLang() === 'en' && product.description_en)
                        ? product.description_en
                        : product.description;
                    document.getElementById('prod-price').innerHTML = '<strong>€' + product.price.toFixed(2) + '</strong>';
                    document.getElementById('addCart').textContent = t('product.add_cart');
                    // add color dots in dedicated container
                    const imgColors = product.images ? Object.keys(product.images) : [];
                    if (imgColors.length) {
                        const container = document.createElement('div');
                        container.className = 'color-dots';
                        imgColors.slice(0, 4).forEach(c => {
                            const linkDot = document.createElement('a');
                            linkDot.href = 'product.html?id=' + encodeURIComponent(product.id) + '&color=' + encodeURIComponent(c);
                            linkDot.setAttribute('aria-label', 'Ver cor ' + c);
                            const d = document.createElement('span');
                            d.className = 'color-dot';
                            d.style.background = c;
                            if (activeColor === c) {
                                d.classList.add('selected');
                            }
                            linkDot.appendChild(d);
                            container.appendChild(linkDot);
                        });
                        document.getElementById('prod-colors').appendChild(container);
                    }
                    // render size buttons
                    if (product.sizes && product.sizes.length) {
                        const sizesContainer = document.getElementById('prod-sizes');
                        const label = document.createElement('p');
                        label.className = 'size-label';
                        label.textContent = t('product.size_label');
                        sizesContainer.appendChild(label);
                        const btnGroup = document.createElement('div');
                        btnGroup.className = 'size-buttons';
                        product.sizes.forEach(s => {
                            const btn = document.createElement('button');
                            btn.className = 'size-btn';
                            btn.textContent = s;
                            btn.dataset.size = s;
                            btn.addEventListener('click', function () {
                                btnGroup.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                                btn.classList.add('selected');
                                sizesContainer.classList.remove('size-required');
                            });
                            btnGroup.appendChild(btn);
                        });
                        sizesContainer.appendChild(btnGroup);
                    }
                    document.getElementById('addCart').textContent = t('product.add_cart');
                    document.getElementById('addCart').addEventListener('click', function () { addToCart(product.id, product.name, product.price, activeColor || ''); });

                    // --- Accordion sections ---
                    const accordion = document.getElementById('prod-accordion');
                    const lang = window.getLang ? window.getLang() : 'pt';

                    // 1. Características
                    if (product.characteristics && product.characteristics.length) {
                        const details = document.createElement('details');
                        details.className = 'prod-accordion-item';
                        const summary = document.createElement('summary');
                        summary.textContent = t('product.section_chars');
                        details.appendChild(summary);
                        const table = document.createElement('table');
                        table.className = 'chars-table';
                        product.characteristics.forEach(c => {
                            const tr = document.createElement('tr');
                            const th = document.createElement('th');
                            th.textContent = lang === 'en' && c.label_en ? c.label_en : c.label;
                            const td = document.createElement('td');
                            td.textContent = lang === 'en' && c.value_en ? c.value_en : c.value;
                            tr.appendChild(th);
                            tr.appendChild(td);
                            table.appendChild(tr);
                        });
                        details.appendChild(table);
                        accordion.appendChild(details);
                    }

                    // 2. Guia de Tamanhos
                    if (product.size_guide) {
                        const sg = product.size_guide;
                        const details = document.createElement('details');
                        details.className = 'prod-accordion-item';
                        const summary = document.createElement('summary');
                        summary.textContent = t('product.section_sizes');
                        details.appendChild(summary);
                        const table = document.createElement('table');
                        table.className = 'size-guide-table';
                        const headers = lang === 'en' && sg.headers_en ? sg.headers_en : sg.headers;
                        const thead = document.createElement('thead');
                        const headRow = document.createElement('tr');
                        headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; headRow.appendChild(th); });
                        thead.appendChild(headRow);
                        table.appendChild(thead);
                        const tbody = document.createElement('tbody');
                        sg.rows.forEach(row => {
                            const tr = document.createElement('tr');
                            row.forEach(cell => { const td = document.createElement('td'); td.textContent = cell; tr.appendChild(td); });
                            tbody.appendChild(tr);
                        });
                        table.appendChild(tbody);
                        details.appendChild(table);
                        accordion.appendChild(details);
                    }

                    // 3. Rastreabilidade
                    if (product.traceability) {
                        const tr_ = product.traceability;
                        const details = document.createElement('details');
                        details.className = 'prod-accordion-item';
                        const summary = document.createElement('summary');
                        summary.textContent = t('product.section_trace');
                        details.appendChild(summary);
                        const table = document.createElement('table');
                        table.className = 'chars-table';
                        const rows = [
                            [t('product.trace_origin'), lang === 'en' ? tr_.origin_en : tr_.origin],
                            [t('product.trace_material'), lang === 'en' ? tr_.material_source_en : tr_.material_source],
                            [t('product.trace_manufacturer'), lang === 'en' ? tr_.manufacturer_en : tr_.manufacturer],
                            [t('product.trace_certifications'), (tr_.certifications || []).join(' · ')],
                            [t('product.trace_carbon'), lang === 'en' ? tr_.carbon_footprint_en : tr_.carbon_footprint]
                        ];
                        rows.forEach(([label, value]) => {
                            const tr = document.createElement('tr');
                            const th = document.createElement('th'); th.textContent = label;
                            const td = document.createElement('td'); td.textContent = value;
                            tr.appendChild(th); tr.appendChild(td);
                            table.appendChild(tr);
                        });
                        details.appendChild(table);
                        accordion.appendChild(details);
                    }
                })
                .then(() => {
                    const layout = document.querySelector('.product-layout');
                    if (layout) {
                        const top = layout.getBoundingClientRect().top + window.scrollY - 16;
                        window.scrollTo({ top, behavior: 'smooth' });
                    }
                })
                .catch(err => {
                    console.error('Error loading product data:', err);
                    document.querySelector('.container').innerHTML = '<p>Erro ao carregar produto.</p>';
                });
        })();
    </script>
</body>

</html>
